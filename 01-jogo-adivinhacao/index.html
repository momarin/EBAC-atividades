<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jogo de Adivinhação</title>
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css" />
    <!-- JS -->
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="container">
      <header><h1>Jogo de Adivinhação</h1></header>
      <main>
        <div class="instrucoes active">
          <p>
            Esse é um jogo de adivinhação de número randomizado. Você terá 10
            chances para acertar o número recebendo dicas nde maior ou menor
            decorrer do jogo.
          </p>
          <p>Clique no botão iniciar para começar!</p>
          <button class="btn-iniciar">Iniciar</button>
        </div>

        <!-- Área do jogo inicialmente escondida -->
        <div class="area-jogo">
          <p>Digite um número de 1 a 100:</p>
          <input class="input-numero" type="number" min="1" max="100" />
          <button class="btn-chutar">Chutar</button>
          <p class="mensagem"></p>
          <p class="tentativas">Tentativas restantes: 10</p>
        </div>
      </main>
    </div>
  </body>
</html>
