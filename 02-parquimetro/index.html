<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parquímetro</title>

    <!-- css -->
    <link rel="stylesheet" href="style.css" />
    <!-- JS -->
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <header>
        <h1>Parquímetro Estrela</h1>
        <h3>Valor hora: R$ 10,00</h3>
        <h3>Meia hora: R$ 5,00</h3>
      </header>

      <label for="placa">Placa do Automóvel:</label>
      <input id="placa" type="text" placeholder="Placa: VHX 0000" required />
      <label for="permanecia">Tempo de permanência:</label>
      <input id="permanecia" type="number" placeholder="em minutos" />
      <button>Calcular</button>

      <div class="caixa-resultado">
        <h4>Valor a pagar:</h4>
        <p id="resultado">R$ 20,00</p>

        <label for="recebido">Valor recebido:</label>
        <input id="recebido" type="number" placeholder="00,00" />
        <h4>Troco:</h4>
        <p id="troco">10,00</p>
      </div>
    </main>
  </body>
</html>
