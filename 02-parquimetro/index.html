<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parquímetro</title>

    <!-- css -->
    <link rel="stylesheet" href="style.css" />
    <!-- JS -->
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <header>
        <h1>Parquímetro Estrela</h1>
        <h3>Valor da hora: <span>R$ 1,75</span></h3>
        <h3>Meia hora: <span>R$ 1,00</span></h3>
        <h3>Tempo máximo 120 min: <span>R$ 3,00</span></h3>
      </header>

      <label for="permanencia">Tempo de permanência:</label>
      <input id="permanencia" type="number" placeholder="em minutos" required />
      <button onclick="cliente.calcular()">Calcular</button>

      <div class="caixa-resultado">
        <h4>Valor a pagar:</h4>
        <p id="resultado">R$ 00,00</p>

        <label for="recebido">Valor recebido:</label>
        <input id="recebido" type="number" placeholder="00,00" />
        <button onclick="cliente.calcularTroco()">Calcular</button>
        <h4>Troco:</h4>
        <p id="troco">00,00</p>
      </div>
    </main>
  </body>
</html>
